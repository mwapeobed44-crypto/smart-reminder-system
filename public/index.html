<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reminder System</title>
  <link rel="stylesheet" href="style.css">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div class="container">

  <!-- 🌟 TITLE -->
  <h1 class="main-title">
    BLW SA ZONE H EVENTS REMINDER SYSTEM <br>
    <span class="sub-title">KAPASA MAKASA UNIVERSITY</span>
  </h1>

  <!-- 🔐 AUTH SECTION -->
  <div class="card">
    <h2><i class="fa-solid fa-user"></i> Account</h2>

    <div class="input-group">
      <i class="fa-solid fa-envelope"></i>
      <input type="email" id="email" placeholder="Email">
    </div>

    <div class="input-group">
      <i class="fa-solid fa-lock"></i>
      <input type="password" id="password" placeholder="Password">
    </div>

    <div style="display:flex; gap:10px; margin-top:10px;">
      <button type="button" onclick="register()">Register</button>
      <button type="button" onclick="login()">Login</button>
      <button type="button" onclick="logout()" style="background:red;">Logout</button>
    </div>
  </div>

  <!-- 📌 APP SECTION (ALWAYS IN DOM) -->
  <div id="appSection" style="display:none;">

    <!-- FORM -->
    <div class="card">
      <h2><i class="fa-solid fa-bell"></i> Add Reminder</h2>

      <form id="reminderForm">

        <label>Title</label>
        <div class="input-group">
          <input type="text" id="title" required>
        </div>

        <label>Type</label>
        <div class="input-group">
          <select id="type">
            <option value="event">Event</option>
            <option value="birthday">Birthday</option>
          </select>
        </div>

        <label>Phone</label>
        <div class="input-group">
          <input type="tel" id="phone" placeholder="2609XXXXXXXX" required>
        </div>

        <label>Date & Time</label>
        <div class="input-group">
          <input type="datetime-local" id="date" required>
        </div>

        <button type="submit">
          <i class="fa-solid fa-plus"></i> Add Reminder
        </button>

      </form>
    </div>

    <!-- LIST -->
    <div class="card">
      <h2><i class="fa-solid fa-list"></i> Reminders</h2>
      <ul id="reminderList"></ul>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
